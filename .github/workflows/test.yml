name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: run unit tests
        id: tests
        run: |
          set +e
          go test -json -v ./... > /tmp/test.json
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: build report
        if: github.event_name == 'pull_request'
        run: |
          PASS=$(grep -c '"Action":"pass","Test"' /tmp/test.json || true)
          FAIL=$(grep -c '"Action":"fail","Test"' /tmp/test.json || true)
          SKIP=$(grep -c '"Action":"skip","Test"' /tmp/test.json || true)
          STATUS=":white_check_mark: passing"
          [ "${{ steps.tests.outputs.exit }}" != "0" ] && STATUS=":x: failing"

          {
            echo "<!-- bot:unit-test-report -->"
            echo "## Unit tests — $STATUS"
            echo ""
            echo "| pass | fail | skip |"
            echo "|------|------|------|"
            echo "| $PASS | $FAIL | $SKIP |"
            if [ "${FAIL:-0}" -gt 0 ]; then
              echo ""
              echo "### Failures"
              echo '```'
              grep '"Action":"fail","Test"' /tmp/test.json \
                | python3 -c 'import sys, json; [print(o["Package"]+"."+o["Test"]) for o in (json.loads(l) for l in sys.stdin) if o.get("Test")]' \
                | sort -u
              echo '```'
            fi
            echo ""
            echo "[Full run log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > /tmp/body.md

      - name: find existing comment
        if: github.event_name == 'pull_request'
        id: find
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'bot:unit-test-report'

      - name: post or update comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/body.md
          edit-mode: replace

      - name: surface exit code
        if: always()
        run: exit ${{ steps.tests.outputs.exit }}
