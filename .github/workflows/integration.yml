name: integration

on:
  schedule:
    # Daily at 12:00 UTC. Hits live Polymarket CLOB to confirm the SDK's
    # assumptions (currently: orderbook sortedness) still hold.
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: orderbook sortedness check
        run: go test -tags integration -v -run TestOrderBookFromCLOBIsSorted ./internal/clob/...
