name: integration

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: orderbook sortedness check
        run: go test -tags integration -v -run TestOrderBookFromCLOBIsSorted ./internal/clob/...
