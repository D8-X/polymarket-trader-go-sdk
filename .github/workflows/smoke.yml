name: smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: smoke tests
        env:
          POLYMARKET_TEST_PK: ${{ secrets.POLYMARKET_TEST_PK }}
          POLYMARKET_TEST_DEPOSIT_WALLET: ${{ secrets.POLYMARKET_TEST_DEPOSIT_WALLET }}
        run: |
          set +e
          go test -tags=smoke -v ./tests/smoke/... | tee /tmp/test.out
          echo "EXIT=$?" >> "$GITHUB_ENV"
          exit 0

      - name: summary
        if: always()
        run: |
          {
            echo "## Polymarket smoke"
            echo ""
            if grep -q "^--- FAIL" /tmp/test.out 2>/dev/null; then
              echo "**Status:** failed"
            elif grep -q "^--- PASS" /tmp/test.out 2>/dev/null; then
              echo "**Status:** passed"
            elif grep -q "^--- SKIP" /tmp/test.out 2>/dev/null; then
              echo "**Status:** all skipped"
            else
              echo "**Status:** unknown"
            fi
            echo ""
            echo "Tests:"
            grep -E "^--- (PASS|FAIL|SKIP):" /tmp/test.out 2>/dev/null \
              | sed -E 's/^--- ([A-Z]+): ([A-Za-z0-9_]+).*$/- \2: \1/' \
              || true
          } >> "$GITHUB_STEP_SUMMARY"
          exit ${EXIT:-1}
