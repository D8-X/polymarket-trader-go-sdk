name: smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
      - name: auth smoke test
        env:
          POLYMARKET_TEST_PK: ${{ secrets.POLYMARKET_TEST_PK }}
        run: go test -tags=smoke -run TestAuthSmoke -v ./tests/smoke/...
